services:
  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # 你的 AI 求职助手（MCP Server）
  achi:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env          # API keys 放这里，不写进镜像
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_data:
